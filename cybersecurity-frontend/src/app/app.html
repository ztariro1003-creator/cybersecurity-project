<div *ngIf="router.url !== '/login'" class="top-shell">
  <header class="top-header">
    <div class="brand-block">
      <h1>Cybersecurity Incident Intelligence System</h1>
      <p class="brand-subtitle">Security Operations Center</p>
    </div>
  </header>

  <nav class="main-nav">
    <div class="nav-left">
      <a routerLink="/dashboard" routerLinkActive="active-link">Dashboard</a>
      <a routerLink="/incidents" routerLinkActive="active-link">Incidents</a>
      <a routerLink="/assets" routerLinkActive="active-link" *ngIf="!authService.isViewer()">Assets</a>
      <a routerLink="/threats" routerLinkActive="active-link" *ngIf="!authService.isViewer()">Threats</a>
      <a routerLink="/reports" routerLinkActive="active-link" *ngIf="!authService.isViewer()">Reports</a>
    </div>

    <div class="nav-right">
      <div class="user-card">
        <div class="user-avatar">
          <span>👤</span>
        </div>
        <div class="user-meta">
          <span class="user-name">{{ authService.getUsername() || 'User' }}</span>
          <span class="user-role">{{ authService.getRole() }}</span>
        </div>
      </div>

      <button class="logout-btn" (click)="logout()">Logout</button>
    </div>
  </nav>
</div>

<router-outlet></router-outlet>
